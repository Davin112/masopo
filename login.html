<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login Petugas - Puskesmas Bina Sehat</title>

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;800&display=swap" rel="stylesheet">

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --primary: #f74a05;
            --primary-dark: #0ceaf1;
            --text: #0f172a;
            --muted: #64748b;
            --border: #e2e8f0;
            --danger: #ef4444;
        }

        body {
            font-family: 'Poppins', 'Segoe UI', sans-serif;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background:
                radial-gradient(circle at top left, rgba(34,197,94,0.15), transparent 30%),
                radial-gradient(circle at bottom right, rgba(59,130,246,0.15), transparent 30%),
                linear-gradient(135deg, #ecfeff 0%, #f0fdf4 100%);
            padding: 20px;
            overflow: hidden;
            position: relative;
        }

        /* Background Blur */
        .bg-circle {
            position: absolute;
            border-radius: 50%;
            filter: blur(70px);
            opacity: 0.25;
            z-index: 0;
        }

        .bg-circle.one {
            width: 260px;
            height: 260px;
            background: #22c55e;
            top: -70px;
            left: -70px;
        }

        .bg-circle.two {
            width: 300px;
            height: 300px;
            background: #38bdf8;
            bottom: -100px;
            right: -100px;
        }

        .login-wrapper {
            width: 100%;
            max-width: 420px;
            position: relative;
            z-index: 1;
        }

        .login-box {
            background: rgba(255,255,255,0.92);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255,255,255,0.7);
            border-radius: 24px;
            padding: 35px 30px;
            box-shadow: 0 20px 40px rgba(15,23,42,0.08);
            animation: fadeIn 0.5s ease;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .logo {
            width: 78px;
            height: 78px;
            margin: 0 auto 18px;
            border-radius: 20px;
            background: linear-gradient(135deg, #22c55e, #4ade80);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 34px;
            color: white;
            box-shadow: 0 12px 25px rgba(34,197,94,0.25);
        }

        h2 {
            text-align: center;
            color: var(--text);
            font-size: 28px;
            margin-bottom: 8px;
            font-weight: 800;
        }

        .subtitle {
            text-align: center;
            color: var(--muted);
            font-size: 14px;
            margin-bottom: 28px;
            line-height: 1.5;
        }

        .form-group {
            margin-bottom: 18px;
        }

        label {
            display: block;
            margin-bottom: 7px;
            color: #334155;
            font-size: 14px;
            font-weight: 600;
        }

        .input-box {
            position: relative;
        }

        .input-box span {
            position: absolute;
            left: 14px;
            top: 50%;
            transform: translateY(-50%);
            font-size: 16px;
        }

        input {
            width: 100%;
            padding: 14px 14px 14px 44px;
            border-radius: 14px;
            border: 1px solid var(--border);
            font-size: 15px;
            background: #f8fafc;
            outline: none;
            transition: all 0.2s ease;
        }

        input:focus {
            border-color: var(--primary);
            background: white;
            box-shadow: 0 0 0 4px rgba(34,197,94,0.12);
        }

        button {
            width: 100%;
            padding: 14px;
            border: none;
            border-radius: 14px;
            background: linear-gradient(135deg, #22c55e, #16a34a);
            color: white;
            font-size: 15px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.25s ease;
            margin-top: 8px;
            box-shadow: 0 10px 18px rgba(34,197,94,0.2);
        }

        button:hover {
            transform: translateY(-1px);
            box-shadow: 0 14px 22px rgba(34,197,94,0.28);
        }

        .error {
            background: #fef2f2;
            color: #b91c1c;
            border: 1px solid #fecaca;
            padding: 12px;
            border-radius: 12px;
            font-size: 14px;
            margin-bottom: 18px;
            text-align: center;
        }

        .footer {
            margin-top: 22px;
            text-align: center;
            font-size: 13px;
            color: var(--muted);
        }

        .footer a {
            color: var(--primary-dark);
            text-decoration: none;
            font-weight: 600;
        }

        .footer a:hover {
            text-decoration: underline;
        }

        .security-note {
            margin-top: 18px;
            background: #f8fafc;
            border: 1px solid var(--border);
            border-radius: 14px;
            padding: 12px;
            font-size: 12px;
            color: #475569;
            line-height: 1.5;
        }

        @media (max-width: 480px) {
            .login-box {
                padding: 28px 22px;
                border-radius: 20px;
            }

            h2 {
                font-size: 24px;
            }
        }
    </style>
</head>
<body>

    <div class="bg-circle one"></div>
    <div class="bg-circle two"></div>

    <div class="login-wrapper">

        <div class="login-box">

            <div class="logo">🏥</div>

            <h2>Login Petugas</h2>
            <p class="subtitle">
                Sistem Dashboard Puskesmas Bina Sehat<br>
                Silakan masuk menggunakan akun petugas.
            </p>

            {% if error %}
                <div class="error">
                    {{ error }}
                </div>
            {% endif %}

            <form method="POST">

                <div class="form-group">
                    <label>Username</label>
                    <div class="input-box">
                        <span>👤</span>
                        <input type="text" name="username" placeholder="Masukkan username" required>
                    </div>
                </div>

                <div class="form-group">
                    <label>Password</label>
                    <div class="input-box">
                        <span>🔒</span>
                        <input type="password" name="password" placeholder="Masukkan password" required>
                    </div>
                </div>

                <button type="submit">Masuk ke Dashboard</button>

            </form>

            <div class="security-note">
                🔐 Akses dashboard hanya diperuntukkan bagi dokter dan petugas resmi.
            </div>

            <div class="footer">
                Kembali ke <a href="/">Halaman Pendaftaran Pasien</a>
            </div>

        </div>

    </div>

</body>
</html>
```
